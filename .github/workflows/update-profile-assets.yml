name: Update profile assets

on:
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-dev-pulse:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Generate dynamic dev pulse
        run: python scripts/generate_dev_pulse.py
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_USERNAME: kevin-kraus

      - name: Commit generated assets
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add assets/dev-pulse.svg
          git diff --cached --quiet || git commit -m "Update dynamic profile assets"
          git push
